<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>
    <style>
        /* Your existing CSS code */

        /* Additional styling for header */
        header {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.9)), url(profile.jpg) no-repeat center center;
            background-size: cover;
            padding: 6rem 0;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        header h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        header p {
            font-size: 1.8rem;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* Additional styling for navigation */
        nav {
            text-align: center;
            margin: 0;
            padding: 1rem 0;
            background-color: #222;
        }

        /* Additional styling for navigation links */
        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 0.3rem 1.5rem;
            border-radius: 20px;
            transition: background-color 0.3s, color 0.3s;
            border: 2px solid #d32f2f;
        }

        .nav-link:hover {
            background-color: #d32f2f;
            color: #000;
        }

        /* Additional styling for section */
        section {
            background-color: #111;
            border-radius: 15px;
            padding: 3rem;
            margin: 3rem auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Additional styling for Google Docs iframe container */
        #google-doc-container {
            text-align: center;
            padding: 2rem;
            border-radius: 15px;
            background-color: rgba(0, 0, 0, 0.5);
            transform: rotate(-10deg) translateX(-5%);
            filter: contrast(150%) hue-rotate(10deg) saturate(150%);
            animation: glitch 2s infinite;
        }

        #google-doc-container iframe {
            width: 100%;
            max-width: 1000px;
            height: 80vh;
            border: none;
        }

        /* Additional styling for glitch animation */
        @keyframes glitch {
            0% {
                transform: translateX(0) skewX(0);
            }
            20% {
                transform: translateX(-5%) skewX(2deg);
            }
            40% {
                transform: translateX(5%) skewX(-2deg);
            }
            60% {
                transform: translateX(-3%) skewX(1deg);
            }
            80% {
                transform: translateX(3%) skewX(-1deg);
            }
            100% {
                transform: translateX(0) skewX(0);
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    
    <nav>
        <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
        <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
        <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
        <a href="https://dndiy.github.io/" class="nav-link">About</a>
    </nav>
       
    <section id="about">
        <div id="google-doc-container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true"></iframe>
        </div>
    </section>
</body>
</html>
