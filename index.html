<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

    <style>
        body, h1, h2, p {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
        }
        body {
            background-color: #111;
            color: #ff5555;
            overflow-x: hidden;
            position: relative;
        }
        header {
            text-align: center;
            padding: 2rem 0;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 5px #ff5555, 0 0 10px #ff5555;
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        .nav-link {
            text-decoration: none;
            margin: 0 1rem;
            color: #ff5555;
            transition: all 0.3s;
        }
        .nav-link:hover {
            color: #fff;
            transform: scale(1.1);
        }
        section {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: rgba(50, 50, 50, 0.9);
            border-radius: 10px;
        }
        #google-doc-container iframe {
            width: 100%;
            height: 80vh;
            border: none;
            box-shadow: 0 0 15px rgba(255, 85, 85, 0.7);
        }
        @media (max-width: 768px) {
            .nav-link {
                display: block;
                text-align: center;
                margin: 0.5rem 0;
            }
        }
    </style>

    <!-- JavaScript for random backgrounds -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const backgrounds = [
                "url('cyberpunk_image1.jpg')", 
                "url('cyberpunk_image2.jpg')", 
                "url('cyberpunk_image3.jpg')"
            ];
            const bodyElement = document.querySelector('body');
            const randomBackground = backgrounds[Math.floor(Math.random() * backgrounds.length)];
            bodyElement.style.backgroundImage = randomBackground;
            bodyElement.style.backgroundSize = 'cover';
            bodyElement.style.backgroundPosition = 'center';
        });
    </script>
</head>

<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    <nav>
        <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
        <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
        <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
        <a href="https://dndiy.github.io/" class="nav-link">About</a>
    </nav>
    <section id="about">
        <div id="google-doc-container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true"></iframe>
        </div>
    </section>
</body>

</html>
