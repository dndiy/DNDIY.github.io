<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberArt GMAster</title>
    <style>
        /* Reset some default styles */
        body, h1, h2, p {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* Header styling */
        header {
            background: url(profile.jpg) no-repeat center center;
            background-size: cover;
            padding: 4rem 0;
            text-align: center;
            border-bottom: 5px solid #d32f2f;
        }

        header h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #d32f2f;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        header p {
            font-size: 1.8rem;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* Navigation styling */
        nav {
            text-align: center;
            padding: 1rem 0;
            background-color: #111;
            border-top: 5px solid #d32f2f;
        }

        /* Navigation links */
        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 0.3rem 1.5rem;
            border-radius: 20px;
            transition: background-color 0.3s, color 0.3s;
            border: 2px solid #d32f2f;
        }

        .nav-link:hover {
            background-color: #d32f2f;
            color: #000;
        }

        /* Section styling */
        section {
            background-color: #000;
            padding: 3rem;
            margin: 3rem auto;
            position: relative;
            border: 5px solid #d32f2f;
            border-radius: 15px;
            overflow: hidden;
        }

        /* Glitch animation */
        @keyframes glitch {
            0%, 100% {
                transform: translateX(0);
            }
            20%, 80% {
                transform: translateX(-5%) scaleY(1.1);
            }
            40%, 60% {
                transform: translateX(5%) scaleY(0.9);
            }
        }

        /* Glitch styling for Google Docs iframe */
        .glitch {
            transform: rotate(-5deg) translateX(-5%);
            filter: contrast(120%) hue-rotate(10deg) saturate(150%);
            animation: glitch 2s infinite;
        }

        /* Dynamic content */
        #dynamic-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d32f2f;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>CyberArt GMAster</h1>
        <p>Immerse Yourself in the Future of Art</p>
    </header>
    
    <nav>
        <a href="https://example.com/art" class="nav-link">Gallery</a>
        <a href="https://example.com/exhibitions" class="nav-link">Exhibitions</a>
        <a href="https://example.com/artists" class="nav-link">Artists</a>
        <a href="https://example.com/about" class="nav-link">About</a>
    </nav>
       
    <section id="about">
        <div class="glitch">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true"></iframe>
        </div>
        <div id="dynamic-content">Explore the Unseen</div>
    </section>

    <script>
        // Change dynamic content on load
        const dynamicContent = document.getElementById('dynamic-content');
        const phrases = [
            "Dive into the Code",
            "Embrace Neon Creativity",
            "Witness Digital Dreams",
            "Break the Virtual Boundaries"
        ];

        const randomIndex = Math.floor(Math.random() * phrases.length);
        dynamicContent.textContent = phrases[randomIndex];
    </script>
</body>
</html>
