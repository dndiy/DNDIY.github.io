<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>
    <style>
        /* Your existing CSS code */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #222;
            color: #fff;
        }
        header {
            background: url(profile.jpg) no-repeat center center;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 10rem 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
        }

        /* Hide content by default */
        .section-content {
            display: none;
        }

        /* Show active section content */
        .section-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    
    <nav class="tabs">
        <a href="#art" class="tab-button" data-section-id="art">Art</a>
        <a href="#video" class="tab-button" data-section-id="video">Video</a>
        <a href="#machine" class="tab-button" data-section-id="builds">Builds</a>
        <a href="#about" class="tab-button" data-section-id="about">About</a>
    </nav>

    <section id="art" class="section-content">
        <div style="height: 100vh; background-color: #333;">
            <h2 style="text-align: center;">Art Portfolio</h2>
            <div id="google-photos-slideshow">
                <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQxPyDVQx577BwZYgouQIvmAdHp34rV4OPZF1Yh1TsEIz-DnKxNTSJrzsjEvFnqbwxsvpZRBTCwrnHU/embed?start=true&loop=true&delayms=3000" 
                frameborder="0" width="100%" height="100%" 
                allowfullscreen="true" 
                mozallowfullscreen="true" 
                webkitallowfullscreen="true"></iframe>
            </div>
        </div>
    </section>

    <section id="video" class="section-content">
        <div style="height: 100vh; background-color: #333;">
            <h2 style="text-align: center;">Video</h2>
            <div class="video-container">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PLLmfUsn8D20V_I1wSABfHqTJSXhTT7bcl" 
                title="YouTube video player" 
                frameborder="0" allow="accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <section id="machine" class="section-content">
        <div style="height: 100vh; background-color: #333;">
            <h2 style="text-align: center;">Builds</h2>
            <!-- Paste your Google Photos album embed code here -->
            <iframe src="https://photos.app.goo.gl/tPMRQmK3D4M3P9ya9" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
        </div>
    </section>

    <section id="about" class="section-content">
        <div style="height: 100vh; background-color: #333;">
            <h2 style="text-align: center;">About Me</h2>
            <!-- Your about content goes here -->
            <div id="google-doc-container">
                <p style="text-align: center;">This is some information about me and my work.</p>
                <iframe src="https://docs.google.com/document/d/e/2PACX-1vScq6i8Aw0pQ5LLVRoG-829Ax4fgncNWVq86BMGnh74AU7em7ZREV15osu53st8ytqvuRDPiEGr5cbc/pub?embedded=true"></iframe>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tabButtons = document.querySelectorAll('.tab-button');
            const sectionContents = document.querySelectorAll('.section-content');

            tabButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const sectionId = button.getAttribute('data-section-id');

                    sectionContents.forEach(content => {
                        if (content.id === sectionId) {
                            content.classList.add('active');
                        } else {
                            content.classList.remove('active');
                        }
                    });
                });
            });
        });
    </script>

</body>
</html>
