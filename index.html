<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>

    <!-- Importing Dancing Script font and Montserrat font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* General Settings */
        body, h1, h2, p, a {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            overflow-x: hidden;
            position: relative;
            color: #ddd;
            background-image: url('00085-a window looking out to rocky desert.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }
        h1, p {
            font-family: 'Dancing Script', cursive;
        }

        /* Header */
        header {
            text-align: center;
            padding: 2rem 0;
            position: relative;
            z-index: 1;
            background-color: rgba(0,0,0,0.5);
        }

        /* Navigation */
        nav {
            text-align: center;
            margin: 1rem 0;
            background-color: rgba(0,0,0,0.5);
        }
        .nav-link {
            text-decoration: none;
            margin: 0 1rem;
            padding: 0.5rem 1rem;
            display: inline-block;
            border: 2px solid #ddd;
            border-radius: 4px;
            color: #ddd;
            transition: all 0.3s;
        }
        .nav-link:hover {
            background-color: rgba(255,255,255,0.2);
        }

        /* Content */
        section {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
        }

        /* Google Doc Embed */
        #google-doc-container iframe {
            width: 100%;
            height: 80vh;
            border: none;
        }

        /* Media Queries for Responsiveness */
        @media (max-width: 768px) {
            .nav-link {
                display: block;
                text-align: center;
                margin: 0.5rem 0;
            }
        }
    </style>

</head>

<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    
    <nav>
        <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
        <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
        <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
        <a href="https://dndiy.github.io/" class="nav-link">About</a>
    </nav>

    <section id="about">
        <div id="google-doc-container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true"></iframe>
        </div>
    </section>
</body>

</html>
