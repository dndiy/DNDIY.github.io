<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Artist Portfolio</title>
    <style>
        /* Your existing CSS code */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #222;
            color: #fff;
        }
        header {
            background: url(profile.jpg) no-repeat center center;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 10rem 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
        }
        section {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #333;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .artwork {
            width: calc(33.33% - 1rem);
            margin-bottom: 2rem;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
        .artwork img {
            max-width: 100%;
            height: auto;
        }
        /* New CSS for video embedding */
        .video-container {
            position: relative;
            overflow: hidden;https://github.com/dndiy/DNDIY.github.io/blob/main/index.html
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    <nav>
        <a href="#">Art</a>
        <a href="#">Video</a>
        <a href="#">Machine</a>
        <a href="#">YouTube</a>
    </nav>
    <section>
        <h2>Portfolio</h2>
        <div class="gallery">
            <div class="artwork">
                <img src="scary2.png" alt="Artwork 1">
            </div>
            <div class="artwork">
                <img src="ComfyUI_00004_.jpg" alt="Artwork 2">
            </div>
            <div class="artwork">
                <img src="image3.jpg" alt="Artwork 3">
            </div>
            <!-- Add more artwork divs as needed -->
        </div>
    </section>
    <section id="youtube">
        <h2>YouTube</h2>
        <div class="video-container">
        <iframe width="560" height="315" src="https://youtube.com/playlist?list=PLLmfUsn8D20V_I1wSABfHqTJSXhTT7bcl" frameborder="0" allowfullscreen></iframe>
    </div>
         </div>
    </section>
</body>
</html>
