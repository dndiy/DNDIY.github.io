<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>
    <style>
        /* Your existing CSS code */
        body {
            font-family: Arial, sans-serif;
            margin: 0 auto; /* Center content horizontally */
            padding: 0;
            background-color: #222;
            color: #fff;
        }
        header {
            background: url(profile.jpg) no-repeat center center;
            background-size: cover;
            width: 90%;
            color: white;
            text-align: center;
            padding: 28rem 0; /* Adjust the padding-top value */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
        }
        .nav-link {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
            border: 2px solid #d32f2f;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .nav-link:hover {
            background-color: #d32f2f;
            color: #fff;
        }
        /* Media query for screens with a maximum width of 768px (typical mobile devices) */
        @media (max-width: 768px) {
        .nav-link {
            margin: 0.5rem 0;
            display: block;
            text-align: center;
    }
        section {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #333;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* Add additional margin below the header */
        header {
            /* Other styles... */
            margin-bottom: 1rem; /* Add margin below the header */
}
            
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .artwork {
            width: calc(33.33% - 1rem);
            margin-bottom: 2rem;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
        .artwork img {
            max-width: 100%;
            height: auto;
        }
        .video-container {
            position: relative;
            overflow: hidden;
            width: 100%; /* Video container width */
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            text-align: center; /* Center the video horizontally */
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Slideshow styles */
        .slideshow-container {
            position: relative;
            max-width: 100%;
            margin: 0 auto;
            overflow: hidden;       
            text-align: center; /* Center the slides horizontally */
        }

        .slide {
            display: none;
            text-align: center;
        }

        .slide img {
            width: 100%;
            height: auto;
             vertical-align: middle;
        }    

        .prev,
        .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            cursor: pointer;
            padding: 1rem;
            background-color: rgba(0, 0, 0, 0.5);
            color: #fff;
            text-decoration: none;
            border: none;
        }

        .prev {
            left: 0;
        }

        .next {
            right: 0;
        }
            
        #about {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        #image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding-top: 5rem; /* Adjust this to match header and navigation height */
        }

        #image-container img {
            max-width: 100%;
            max-height: 100%;
            height: auto;
        }
            
         /* Center the Google Docs iframe */
        #google-photos-slideshow {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
            
        /* Center the Google Docs iframe */
        #google-doc-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;            
          }
        /* Set iframe width to 100% of the screen */
        #google-doc-container iframe {
            width: 100vw;
            height: 100vh;
        }
            
    </style>
</head>
<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    
<nav>
    <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
    <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
    <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
    <a href="https://dndiy.github.io/" class="nav-link">About</a>
</nav>
       
    
    <section id="about" class="section-content">
        <div id="google-doc-container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true" frameborder="0"></iframe>
        </div>
    </section>
 <script>
    // Resize Google Doc iframe
        function resizeIframe() {
            const googleDocIframe = document.querySelector('#google-doc-container iframe');
            if (googleDocIframe) {
                const containerHeight = window.innerHeight;
                googleDocIframe.style.height = `${containerHeight}px`;
            }
        }

        // Call the function initially and on window resize
        resizeIframe();
        window.addEventListener('resize', resizeIframe);
 </script>


</body>
</html>
