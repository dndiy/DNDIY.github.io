<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>
    <style>
        /* Your existing CSS code */
        body {
            font-family: Arial, sans-serif;
            margin: 0; auto; /* Center content horizontally */
            padding: 0;
            background-color: #222;
            color: #fff;
        }
        header {
            background: url(profile.jpg) no-repeat center center;
            background-size: cover;
            width: 100%;
            color: white;
            text-align: center;
            padding: 10rem 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
        }
        .nav-link {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
            border: 2px solid #d32f2f;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .nav-link:hover {
            background-color: #d32f2f;
            color: #fff;
        }
        /* Media query for screens with a maximum width of 768px (typical mobile devices) */
        @media (max-width: 768px) {
        .nav-link {
            margin: 0.5rem 0;
            display: block;
            text-align: center;
    }
        section {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #333;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* Add additional margin below the header */
        header {
            /* Other styles... */
            margin-bottom: 2rem; /* Add margin below the header */
}
            
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .artwork {
            width: calc(33.33% - 1rem);
            margin-bottom: 2rem;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
        .artwork img {
            max-width: 100%;
            height: auto;
        }
        .video-container {
            position: relative;
            overflow: hidden;
            width: 100%; /* Video container width */
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            text-align: center; /* Center the video horizontally */
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Slideshow styles */
        .slideshow-container {
            position: relative;
            max-width: 100%;
            margin: 0 auto;
            overflow: hidden;       
            text-align: center; /* Center the slides horizontally */
        }

        .slide {
            display: none;
            text-align: center;
        }

        .slide img {
            width: 100%;
            height: auto;
             vertical-align: middle;
        }    

        .prev,
        .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            cursor: pointer;
            padding: 1rem;
            background-color: rgba(0, 0, 0, 0.5);
            color: #fff;
            text-decoration: none;
            border: none;
        }

        .prev {
            left: 0;
        }

        .next {
            right: 0;
        }
            
        #about {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    
<nav>
    <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
    <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
    <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
    <a href="https://dndiy.github.io/" class="nav-link">About</a>
</nav>
       
    
    <section id="about" class="section-content">
             <div id="pdf-container" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
                   <iframe src="https://drive.google.com/file/d/1BF0HcoaFHoign65PmLnwKjbbme6C51bt/view?usp=sharing?raw=1" frameborder="0" width="100%" height="100%"></iframe>
             </div>

    </section>

 <script>
    
        function resizeIframes() {
            // Resize Google Doc iframe
            const googleDocIframe = document.querySelector('#google-doc-container iframe');
            if (googleDocIframe) {
                const containerWidth = googleDocIframe.parentElement.clientWidth;
                const aspectRatio = 1.0; // Adjust the aspect ratio as needed
                const calculatedHeight = containerWidth / aspectRatio;
                googleDocIframe.style.width = '100%';
                googleDocIframe.style.height = `${calculatedHeight}px`;
            }
        }

        // Call the function initially and on window resize
        resizeIframes();
        window.addEventListener('resize', resizeIframes);

    </script>

</body>
</html>
