<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>
    <style>
        /* Reset some default styles */
        body, h1, h2, p {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: #fff;
        }

        /* Header styling */
        header {
            background: url(profile.jpg) no-repeat center center;
            background-size: cover;
            padding: 6rem 0;
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* Navigation styling */
        nav {
            text-align: center;
            margin: 1rem 0;
        }

        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
        }
        .nav-link {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
            border: 2px solid #d32f2f;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .nav-link:hover {
            background-color: #d32f2f;
            color: #fff;
        }
        
        /* Media query for screens with a maximum width of 768px (typical mobile devices) */
        @media (max-width: 768px) {
            .nav-link {
                margin: 0.5rem 0;
                display: block;
                text-align: center;
            }

        /* Section styling */
        section {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #333;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* Google Docs iframe styling */
        #google-doc-container {
            text-align: center;
        }

        #google-doc-container iframe {
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    
    <nav>   
    <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
    <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
    <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
    <a href="https://dndiy.github.io/" class="nav-link">About</a>
    </nav>
       
    <section id="about">
        <div id="google-doc-container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true"></iframe>
        </div>
    </section>
</body>
</html>
