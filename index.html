<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART Gallery</title>
    <style>
        /* Reset some default styles */
        body, h1, h2, p {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        /* Header styling */
        header {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.9)), url(profile.jpg) no-repeat center center;
            background-size: cover;
            padding: 6rem 0;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        header h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        header p {
            font-size: 1.8rem;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* Navigation styling */
        nav {
            text-align: center;
            margin: 0;
            padding: 1rem 0;
            background-color: #111;
        }

        /* Navigation links */
        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 0.3rem 1.5rem;
            border-radius: 20px;
            transition: background-color 0.3s, color 0.3s;
            border: 2px solid #d32f2f;
        }

        .nav-link:hover {
            background-color: #d32f2f;
            color: #000;
        }

        /* Section styling */
        section {
            background-color: #111;
            border-radius: 15px;
            padding: 3rem;
            margin: 3rem auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Glitch animation */
        @keyframes glitch {
            0%, 100% {
                transform: translateX(0);
            }
            20%, 80% {
                transform: translateX(-5%) scaleY(1.1);
            }
            40%, 60% {
                transform: translateX(5%) scaleY(0.9);
            }
        }

        /* Glitch styling for Google Docs iframe */
        #google-doc-container {
            text-align: center;
            padding: 2rem;
            border-radius: 15px;
            background-color: rgba(0, 0, 0, 0.5);
            transform: rotate(-10deg) translateX(-5%);
            filter: contrast(150%) hue-rotate(10deg) saturate(150%);
            animation: glitch 2s infinite;
        }

        #google-doc-container iframe {
            width: 100%;
            max-width: 1000px;
            height: 80vh;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Discover Artistry</h1>
        <p>Unveil the Creative Universe</p>
    </header>
    
    <nav>
        <a href="https://example.com/art" class="nav-link">Gallery</a>
        <a href="https://example.com/exhibitions" class="nav-link">Exhibitions</a>
        <a href="https://example.com/artists" class="nav-link">Artists</a>
        <a href="https://example.com/about" class="nav-link">About</a>
    </nav>
       
    <section id="about">
        <div id="google-doc-container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true"></iframe>
        </div>
    </section>

    <script>
        // Random glitch effect on load
        const glitchElements = document.querySelectorAll('.glitch');
        glitchElements.forEach(element => {
            element.style.animationDelay = `${Math.random() * 2}s`;
        });
    </script>
</body>
</html>
