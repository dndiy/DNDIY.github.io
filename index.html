<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART Fusion</title>

    <!-- Importing Montserrat font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* General styles */
        body, h1, h2, p, a {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            color: #ddd;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #333;
        }
        /* Navigation */
        nav {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
        }
        nav a {
            text-decoration: none;
            color: #ddd;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 24px;
            width: 90%;
            max-width: 1200px;
        }
        .gallery img {
            max-width: 100%;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 8px;
            }
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <!-- JavaScript for dynamic photo loading and other features -->
    <script>
        window.onload = function() {
            const gallery = document.querySelector(".gallery");
            const images = [
                "00085-a window looking out to rocky desert.jpg",
                "0282b.png",
                "00123-detailed eyes.jpg", //... add more URLs
            ];
            images.forEach(url => {
                const img = document.createElement("img");
                img.src = url;
                gallery.appendChild(img);
            });
        };
    </script>

</head>

<body>
    <h1>Gregory M Aster</h1>

    <nav>
        <a href="https://dndiy.github.io/art/">Art</a>
        <a href="https://youtube.com/dndiy">Video</a>
        <a href="https://dndiy.github.io/builds/">Builds</a>
        <a href="https://dndiy.github.io/">About</a>
    </nav>

    <div class="gallery"></div>
</body>

</html>
