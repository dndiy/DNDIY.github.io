<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>

    <!-- Importing Roboto font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body, h1, h2, p {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif; 
        }
        body {
            overflow-x: hidden;
            position: relative;
        }
        header {
            text-align: center;
            padding: 2rem 0;
            position: relative;
            z-index: 1;
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        .nav-link {
            text-decoration: none;
            margin: 0 1rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            border: 1px solid #fff;
            transition: all 0.3s;
        }
        section {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: rgba(50, 50, 50, 0.9);
            border-radius: 10px;
        }
        #google-doc-container iframe {
            width: 100%;
            height: 80vh;
            border: none;
        }
        @media (max-width: 768px) {
            .nav-link {
                display: block;
                text-align: center;
                margin: 0.5rem 0;
            }
        }
    </style>

    <!-- JavaScript for theme switching and background changes -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const bodyElement = document.querySelector('body');
            const navLinks = document.querySelectorAll(".nav-link");
            const header = document.querySelector('header');

            // Random background for the header
            const backgrounds = [
                "url('00085-a window looking out to rocky desert.jpg')",
                "url('0282b.png')",
                "url('00123-detailed eyes.jpg')"
            ];
            const randomBackground = backgrounds[Math.floor(Math.random() * backgrounds.length)];
            header.style.backgroundImage = randomBackground;
            header.style.backgroundSize = "cover";

            // Random theme chooser
            const themes = ['dark', 'neon-dark', 'goth', 'cyberpunk', 'glitch'];
            const chosenTheme = themes[Math.floor(Math.random() * themes.length)];

            switch (chosenTheme) {
                case 'dark':
                    bodyElement.style.backgroundColor = "#111";
                    bodyElement.style.color = "#ddd";
                    navLinks.forEach(link => {
                        link.style.color = "#ddd";
                    });
                    break;

                case 'neon-dark':
                    bodyElement.style.backgroundColor = "#111";
                    bodyElement.style.color = "#0ff";
                    navLinks.forEach(link => {
                        link.style.color = "#0ff";
                    });
                    break;

                case 'goth':
                    bodyElement.style.backgroundColor = "#210a2e";
                    bodyElement.style.color = "#87377a";
                    navLinks.forEach(link => {
                        link.style.color = "#87377a";
                    });
                    break;

                case 'cyberpunk':
                    bodyElement.style.backgroundColor = "#0d0018";
                    bodyElement.style.color = "#ff007f";
                    navLinks.forEach(link => {
                        link.style.color = "#ff007f";
                    });
                    break;

                case 'glitch':
                    bodyElement.style.backgroundColor = "#111";
                    bodyElement.style.color = "#ddd";
                    header.style.backgroundImage += `, repeating-linear-gradient(45deg, transparent, transparent 2px, #fff 2px, #fff 4px)`;
                    navLinks.forEach(link => {
                        link.style.color = "#ddd";
                        link.style.backgroundImage = "repeating-linear-gradient(45deg, transparent, transparent 1px, #fff 1px, #fff 2px)";
                    });
                    break;
            }
        });
    </script>
</head>

<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    <nav>
        <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
        <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
        <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
        <a href="https://dndiy.github.io/" class="nav-link">About</a>
    </nav>
    <section id="about">
        <div id="google-doc-container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true"></iframe>
        </div>
    </section>
</body>

</html>
