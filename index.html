<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>
    <style>
        /* Your existing CSS code */

        /* Additional styling for header */
        header {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.9)), url(profile.jpg) no-repeat center center;
            background-size: cover;
            padding: 6rem 0;
            text-align: center;
            color: #fff;
        }

        /* Additional styling for header content */
        header h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        header p {
            font-size: 1.5rem;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* Additional styling for navigation */
        nav {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 0.5rem 0;
            border-bottom: 2px solid #d32f2f;
        }

        /* Additional styling for navigation links */
        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #fff;
            font-weight: bold;
        }

        .nav-link {
            padding: 0.3rem 1rem;
            border-radius: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .nav-link:hover {
            background-color: #d32f2f;
            color: #fff;
        }

        /* Additional styling for section */
        section {
            background-color: #444;
            border-radius: 10px;
            padding: 2rem;
            margin: 2rem auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        /* Additional styling for Google Docs iframe container */
        #google-doc-container {
            text-align: center;
            padding: 1rem;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.1);
        }

        #google-doc-container iframe {
            width: 100%;
            max-width: 1000px;
            height: 80vh;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    
    <nav>
        <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
        <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
        <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
        <a href="https://dndiy.github.io/" class="nav-link">About</a>
    </nav>
       
    <section id="about">
        <div id="google-doc-container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true"></iframe>
        </div>
    </section>
</body>
</html>
