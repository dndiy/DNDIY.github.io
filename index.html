<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G M Aster ART</title>
    <style>
        /* Your existing CSS code */
        body {
            font-family: Arial, sans-serif;
            margin: 0; auto; /* Center content horizontally */
            padding: 0;
            background-color: #222;
            color: #fff;
        }
        header {
            background: url(profile.jpg) no-repeat center center;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 10rem 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
        }
        .nav-link {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
            border: 2px solid #d32f2f;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .nav-link:hover {
            background-color: #d32f2f;
            color: #fff;
        }
        /* Media query for screens with a maximum width of 768px (typical mobile devices) */
        @media (max-width: 768px) {
        .nav-link {
            margin: 0.5rem 0;
            display: block;
            text-align: center;
    }
        section {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #333;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .artwork {
            width: calc(33.33% - 1rem);
            margin-bottom: 2rem;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
        .artwork img {
            max-width: 100%;
            height: auto;
        }
        .video-container {
            position: relative;
            overflow: hidden;
            width: 100%; /* Video container width */
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            text-align: center; /* Center the video horizontally */
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Slideshow styles */
        .slideshow-container {
            position: relative;
            max-width: 100%;
            margin: 0 auto;
            overflow: hidden;       
            text-align: center; /* Center the slides horizontally */
        }

        .slide {
            display: none;
            text-align: center;
        }

        .slide img {
            width: 100%;
            height: auto;
             vertical-align: middle;
        }    

        .prev,
        .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            cursor: pointer;
            padding: 1rem;
            background-color: rgba(0, 0, 0, 0.5);
            color: #fff;
            text-decoration: none;
            border: none;
        }

        .prev {
            left: 0;
        }

        .next {
            right: 0;
        }
            
    </style>
</head>
<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
<nav>
    <a href="#art" class="nav-link">Art</a>
    <a href="#video" class="nav-link">Video</a>
    <a href="#machine" class="nav-link">Machine</a>
    <a href="#youtube" class="nav-link">YouTube</a>
    <a href="#about" class="nav-link">About</a>

</nav>
    

    <section id="art">
        <h2>Art Portfolio</h2>
        <div id="google-photos-slideshow">
            <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQxPyDVQx577BwZYgouQIvmAdHp34rV4OPZF1Yh1TsEIz-DnKxNTSJrzsjEvFnqbwxsvpZRBTCwrnHU/embed?start=true&loop=true&delayms=3000" 
              frameborder="0" width="100%" height="0" 
              allowfullscreen="true" 
              mozallowfullscreen="true" 
              webkitallowfullscreen="true"></iframe>
        </div>
    </section>
    
    <section id="youtube">
        <h2>YouTube</h2>
        <div class="video-container">
            <iframe width="100%" height="0" src="https://www.youtube.com/embed/videoseries?list=PLLmfUsn8D20V_I1wSABfHqTJSXhTT7bcl" 
            title="YouTube video player" 
            frameborder="0" allow="accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share" allowfullscreen></iframe>
        </div>
    </section>

        <section id="about">
<section id="about">
    <h2>About Me</h2>
    <p>This is some information about me and my work.</p>
         <iframe src="https://docs.google.com/document/d/e/2PACX-1vScq6i8Aw0pQ5LLVRoG-829Ax4fgncNWVq86BMGnh74AU7em7ZREV15osu53st8ytqvuRDPiEGr5cbc/pub?embedded=true"></iframe>
    </section>


<script>
    function resizeIframes() {
        // Resize Google Photos iframe
        const googlePhotosIframe = document.querySelector('#google-photos-slideshow iframe');
        if (googlePhotosIframe) {
            googlePhotosIframe.style.width = '100%';
            googlePhotosIframe.style.height = (googlePhotosIframe.offsetWidth * 9 / 16) + 'px'; // 16:9 aspect ratio
        }

        // Resize YouTube iframe
        const youtubeIframe = document.querySelector('.video-container iframe');
        if (youtubeIframe) {
            youtubeIframe.style.width = '100%';
            youtubeIframe.style.height = (youtubeIframe.offsetWidth * 9 / 16) + 'px'; // 16:9 aspect ratio
        }
    }

    // Call the function initially and on window resize
    resizeIframes();
    window.addEventListener('resize', resizeIframes);
</script>

</body>
</html>
