<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>
    <style>
        /* Reset some default styles */
        body, h1, h2, p {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #222;
            color: #ff5555;
            transition: background-color 30s linear, color 30s linear; /* Smooth transition */
        }

        header {
            background: url('cyberpunk_image.jpg') no-repeat center center;
            background-size: cover;
            padding: 6rem 0;
            text-align: center;
            filter: grayscale(80%);
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px #ff5555, 0 0 20px #ff5555;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.8;
            text-shadow: 0 0 10px #ff5555, 0 0 20px #ff5555;
        }

        nav {
            text-align: center;
            margin: 1rem 0;
        }

        .nav-link {
            text-decoration: none;
            margin: 0 1rem;
            color: #ff5555;
            border: 2px solid #ff5555;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .nav-link:hover {
            background-color: #ff5555;
            color: #fff;
        }

        @media (max-width: 768px) {
            .nav-link {
                margin: 0.5rem 0;
                display: block;
                text-align: center;
            }
        }

        section {
            max-width: 800px; /* reduced width */
            margin: 0 auto;
            padding: 2rem;
            background-color: #333;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #google-doc-container {
            text-align: center;
            padding: 1rem; /* reduced padding */
        }

        #google-doc-container iframe {
            width: 90%;
            max-width: 1000px;
            height: 75vh;  /* slightly reduced height */
            border: none;
            box-shadow: 0 0 10px #ff5555;
        }
    </style>
</head>
<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    
    <nav>
        <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
        <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
        <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
        <a href="https://dndiy.github.io/" class="nav-link">About</a>
    </nav>
       
    <section id="about">
        <div id="google-doc-container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true"></iframe>
        </div>
    </section>
</body>
</html>
