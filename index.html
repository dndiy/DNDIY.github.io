<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART</title>

    <!-- Importing Orbitron font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet"> 

    <style>
        /* Reset and base styles */
        body, h1, h2, p {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif; /* Applying the Orbitron font */
        }
        body {
            background-color: #111;
            color: #fff;
            overflow-x: hidden;
        }
        header {
            background: url('profile.jpg') no-repeat center center;
            background-size: cover;
            padding: 6rem 0;
            text-align: center;
        }
        header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00; /* Neon green text shadow */
        }
        header p {
            font-size: 1.2rem;
            opacity: 0.8;
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff; /* Neon pink text shadow */
        }
        nav {
            text-align: center;
            margin: 2rem 0;
        }
        .nav-link {
            text-decoration: none;
            margin: 0 1rem;
            color: #0f0; /* Neon green text color */
            border: 2px solid #0f0;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s, text-shadow 0.3s;
        }
        .nav-link:hover {
            background-color: #0f0;
            color: #000;
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff; /* Neon pink text shadow */
        }
        @media (max-width: 768px) {
            .nav-link {
                margin: 0.5rem 0;
                display: block;
                text-align: center;
            }
        }
        section {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background-color: rgba(50, 50, 50, 0.9);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); /* Neon green box shadow */
        }
        #google-doc-container {
            text-align: center;
        }
        #google-doc-container iframe {
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            border: none;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); /* Neon green box shadow */
        }
    </style>

    <!-- JavaScript for random backgrounds -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const backgrounds = [
                "url('00085-a window looking out to rocky desert.jpg')", 
                "url('cyberpunk_image2.jpg')", 
                "url('cyberpunk_image3.jpg')"
                // Add more backgrounds as desired
            ];
            const headerElement = document.querySelector('header');
            const randomBackground = backgrounds[Math.floor(Math.random() * backgrounds.length)];
            headerElement.style.backgroundImage = randomBackground;
        });
    </script>
</head>
<body>
    <header>
        <h1>Gregory M Aster</h1>
        <p>Visual Artist</p>
    </header>
    <nav>   
        <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
        <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
        <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
        <a href="https://dndiy.github.io/" class="nav-link">About</a>
    </nav>
    <section id="about">
        <div id="google-doc-container">
            <iframe src="https://docs.google.com/document/d/e/2PACX-1vSy-0tK6Rwz315j-zSzJpKvcZcfDRaoPb0buvDUVHZjl8nw04_5ybu_ddqxi1Siykpi_B2by1TXnVXQ/pub?embedded=true"></iframe>
        </div>
    </section>
</body>
</html>
