<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAster ART Fusion</title>

    <!-- Importing Roboto font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ... (the rest of the styles remain unchanged) ... */

        /* Gallery */
        .gallery {
            margin-top: 24px;
            width: 90%;
            max-width: 1200px;
            transition: transform 0.3s ease;
        }

        .gallery img {
            width: 150px;  /* Adjusted the width */
            max-width: 100%;
            border-radius: 8px;
            opacity: 0.6;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .gallery img:hover {
            transform: scale(1.05);
            opacity: 1;
        }

        /* ... (the rest of the styles remain unchanged) ... */

    </style>

    <!-- JavaScript for dynamic photo loading and other features -->

    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    
    <script>
      window.onload = function() {
    const gallery = document.querySelector(".gallery");
    const bodyElement = document.querySelector('body');

    // Predefined list of images
    const images = [
        "image1.jpg",
        // ... (rest of your images) ...
    ];

    images.forEach(url => {
        const img = document.createElement("img");
        img.src = "images/" + url;
        img.onload = function() {  // This ensures Masonry activates after images are loaded
            new Masonry(gallery, {
                itemSelector: 'img',
                columnWidth: 160,  /* Adjusted the columnWidth */
                fitWidth: true,
                gutter: 10
            });
        }
        img.addEventListener('click', function() {
            bodyElement.style.backgroundImage = `url(images/${url})`;
            bodyElement.style.backgroundSize = 'cover';
            bodyElement.style.backgroundPosition = 'center center';
        });
        gallery.appendChild(img);
    });

    // Select a random image for the initial background
    const randomImage = images[Math.floor(Math.random() * images.length)];
    bodyElement.style.backgroundImage = `url(images/${randomImage})`;
    bodyElement.style.backgroundSize = 'cover';
    bodyElement.style.backgroundPosition = 'center center';

};  // Close the window.onload function

    </script>

</head>

<body>
    <!-- ... (the rest of your body content remains unchanged) ... -->
</body>

</html>
