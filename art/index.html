<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Portfolio</title>
    <style>
        /* Your existing CSS code */
        body {
            font-family: Arial, sans-serif;
            margin: 0; auto; /* Center content horizontally */
            padding: 0;
            background-color: #222;
            color: #fff;
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        nav a {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
        }
        .nav-link {
            text-decoration: none;
            margin: 0 1rem;
            color: #d32f2f;
            border: 2px solid #d32f2f;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .nav-link:hover {
            background-color: #d32f2f;
            color: #fff;
        }
        /* Media query for screens with a maximum width of 768px (typical mobile devices) */
        @media (max-width: 768px) {
            .nav-link {
                margin: 0.5rem 0;
                display: block;
                text-align: center;
            }
            section {
                max-width: 900px;
                margin: 0 auto;
                padding: 2rem;
                background-color: #333;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            /* Add borders to the section content */
            .section-content {
                border: 2px solid #d32f2f; /* You can adjust the color and thickness */
                border-radius: 5px;
                padding: 1rem; /* Add some padding for spacing */
                margin: 5rem 0; /* Add margin for spacing */
            }
        }
    </style>
</head>
<body>
    <nav>   
    <a href="https://dndiy.github.io/art/" class="nav-link">Art</a>
    <a href="https://youtube.com/dndiy" class="nav-link">Video</a>
    <a href="https://dndiy.github.io/builds/" class="nav-link">Builds</a>
    <a href="https://github.com/dndiy/DNDIY.github.io" class="nav-link">About</a>
    </nav>

    <section id="art" class="section-content">
        <h2 style="text-align: center;">Art Portfolio</h2>
        <div id="google-photos-slideshow">
            <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQxPyDVQx577BwZYgouQIvmAdHp34rV4OPZF1Yh1TsEIz-DnKxNTSJrzsjEvFnqbwxsvpZRBTCwrnHU/embed?start=true&loop=true&delayms=5000&amp;rm=minimal" 
              frameborder="0" width="100%" height="0" 
              allowfullscreen="true" 
              mozallowfullscreen="true" 
              webkitallowfullscreen="true"></iframe>
        </div>
    </section>
    
     <script>
    
        function resizeIframes() {
            // Resize Google Photos iframe
            const googlePhotosIframe = document.querySelector('#google-photos-slideshow iframe');
            if (googlePhotosIframe) {
                googlePhotosIframe.style.width = '100%';
                googlePhotosIframe.style.height = (googlePhotosIframe.offsetWidth * 9 / 16) + 'px'; // 16:9 aspect ratio
            }



           
        }

        // Call the function initially and on window resize
        resizeIframes();
        window.addEventListener('resize', resizeIframes);

    </script>

</body>
</html>
