<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkin's Stories</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
        }
        #story-container {
            border: 5px solid red;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            background-color: black;
            color: white; /* Add this line to set the text color */
        }
        img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <h1>Merkin's Magical Adventures</h1>

    <div id="story-container">
        <!-- Story content will be dynamically added here -->
    </div>

    <script>
        // Array of text prompts
        const storyPrompts = [
"Once upon a time in a magical town, there lived a boy named Sam who discovered a mysterious key.",

"Sam's key led him to a hidden door where he met a girl named Alex, and together, they entered a world of wonders.",

"In this enchanted land, they encountered a wise old owl named Oliver, who shared tales of friendship and bravery.",

"Guided by Oliver's wisdom, Sam and Alex embarked on a quest to find the lost stars that lit up the night sky.",

"On their journey, they befriended a playful cat named Charlie, who had the power to shape-shift into any creature.",

"With Charlie's help, Sam and Alex overcame challenges and discovered the magical Garden of Dreams where wishes came true.",

"In the Garden, they encountered a kind-hearted fairy named Lily, who granted them the ability to spread happiness.",

"Sam and Alex, now armed with joy, returned to their town, sharing laughter and smiles with everyone they met.",

"As the sun set, the town transformed into a glowing haven, and the once-mysterious key turned into a symbol of unity.",

"The tale of Sam, Alex, and their newfound friends became a legend, inspiring generations with the magic of friendship.",
        ];

        // Array of image URLs
        const storyImages = [
            "stories/stories2/xl_1/ComfyUI_0001.png",
            "stories/stories2/xl_1/ComfyUI_0002.png",
            "stories/stories2/xl_1/ComfyUI_0003.png",
            "stories/stories2/xl_1/ComfyUI_0004.png",
            "stories/stories2/xl_1/ComfyUI_0005.png",
            "stories/stories2/xl_1/ComfyUI_0006.png",
            "stories/stories2/xl_1/ComfyUI_0007.png",
            "stories/stories2/xl_1/ComfyUI_0008.png",
            "stories/stories2/xl_1/ComfyUI_0009.png",
            "stories/stories2/xl_1/ComfyUI_0010.png",
            // Add the URLs for your 10 images here
        ];

        // Function to create story elements dynamically
        function createStoryElements() {
            const storyContainer = document.getElementById('story-container');

            for (let i = 0; i < storyPrompts.length; i++) {
                const paragraph = document.createElement('p');
                paragraph.textContent = storyPrompts[i];
                storyContainer.appendChild(paragraph);

                if (i < storyImages.length) {
                    const image = document.createElement('img');
                    image.src = storyImages[i];
                    storyContainer.appendChild(image);
                }
            }
        }

        // Call the function to generate the story elements
        createStoryElements();
    </script>

</body>
</html>
