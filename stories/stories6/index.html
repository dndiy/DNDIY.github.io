<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkin's Stories</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
        }
        #story-container {
            border: 5px solid red;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            background-color: black;
            color: white; /* Add this line to set the text color */
        }
        img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <h1>Merkin's Magical Adventures</h1>

    <div id="story-container">
        <!-- Story content will be dynamically added here -->
    </div>

    <script>
        // Array of text prompts
        const storyPrompts = [
"Once upon a time in the town of Monotonyville, there was Gary, a guy whose idea of thrill was watching paint dry.",

"Gary's partner in crime, Lisa, had a pet rock named Rocky, who, surprisingly, had a more exciting social life.",

"One day, Gary found a map promising 'The Most Average Adventure.' Spoiler alert: it led to a breathtaking field of identical beige rocks.",

"In this thrilling journey, they encountered Phil, a sloth with a passion for extreme relaxation and a knack for giving slow-motion advice.",

"Phil's words of wisdom: 'Why run when you can aimlessly saunter through the tapestry of complete and utter indifference?'",

"Returning to Monotonyville, Gary and Lisa organized the 'Yawnfest Carnival,' featuring games like 'Guess the Number of Bland Beans.'",

"The highlight of the carnival was a riveting contest to determine who could stare at a blank wall the longest.",

"Gary and Lisa became local heroes, hailed for transforming the mundane into an art form and achieving unparalleled levels of mediocrity.",

"Monotonyville, once overlooked, became a tourist destination for those seeking the epitome of uneventful excitement.",

"And so, the legend of Gary, Lisa, and the town that made monotony a masterpiece spread far and wide, or at least as far as anyone cared.",
        ];

        // Array of image URLs
        const storyImages = [
            "/stories/stories6/xl_1/ComfyUI_0001.png",
            "/stories/stories6/xl_1/ComfyUI_0002.png",
            "/stories/stories6/xl_1/ComfyUI_0003.png",
            "/stories/stories6/xl_1/ComfyUI_0004.png",
            "/stories/stories6/xl_1/ComfyUI_0005.png",
            "/stories/stories6/xl_1/ComfyUI_0006.png",
            "/stories/stories6/xl_1/ComfyUI_0007.png",
            "/stories/stories6/xl_1/ComfyUI_0008.png",
            "/stories/stories6/xl_1/ComfyUI_0009.png",
            "/stories/stories6/xl_1/ComfyUI_0010.png",
            // Add the URLs for your 10 images here
        ];

        // Function to create story elements dynamically
        function createStoryElements() {
            const storyContainer = document.getElementById('story-container');

            for (let i = 0; i < storyPrompts.length; i++) {
                const paragraph = document.createElement('p');
                paragraph.textContent = storyPrompts[i];
                storyContainer.appendChild(paragraph);

                if (i < storyImages.length) {
                    const image = document.createElement('img');
                    image.src = storyImages[i];
                    storyContainer.appendChild(image);
                }
            }
        }

        // Call the function to generate the story elements
        createStoryElements();
    </script>

</body>
</html>
