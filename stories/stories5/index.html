<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkin's Stories</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
        }
        #story-container {
            border: 5px solid red;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            background-color: black;
            color: white; /* Add this line to set the text color */
        }
        img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <h1>Merkin's Magical Adventures</h1>

    <div id="story-container">
        <!-- Story content will be dynamically added here -->
    </div>

    <script>
        // Array of text prompts
        const storyPrompts = [

"In the thrilling town of Mundanityville, lived Joe, a guy who measured his excitement in sighs per hour.",

"Joe's best friend, Sarah, had a pet snail named Turbo, known for its breathtaking speed, at least in snail terms.",

"One fateful day, Joe stumbled upon a pamphlet promising 'The Most Average Adventure Ever.' He couldn't resist mediocrity.",

"The quest led them to a field of identical rocks, each claiming to be the 'Rock of Mild Amusement.' Spoiler: none were amusing.",

"Enter Ted, a self-proclaimed expert in the art of blending into the background. He offered a masterclass in 'Invisibility for Dullards.'",

"Their exciting journey included a pit stop at the Library of Utterly Unremarkable Facts, curated by a librarian with a passion for beige.",

"As they continued, they encountered a philosopher slug named Phil, who pondered the deep meaning of apathetic existence.",

"Phil's life-changing advice: 'Why sprint when you can leisurely stroll through the labyrinth of sheer uneventfulness?'",

"Back in Mundanityville, Joe and Sarah celebrated their 'Thrill-Free Festival' where the highlight was a riveting game of 'Watch Paint Dry.'",

"The festival gained fame for being the least talked-about event in history, making Mundanityville the epicenter of unremarkable tales.",
        ];

        // Array of image URLs
        const storyImages = [
            "/xl_1/ComfyUI_0001.png",
            "/xl_1/ComfyUI_0002.png",
            "/xl_1/ComfyUI_0003.png",
            "/xl_1/ComfyUI_0004.png",
            "/xl_1/ComfyUI_0005.png",
            "/xl_1/ComfyUI_0006.png",
            "/xl_1/ComfyUI_0007.png",
            "/xl_1/ComfyUI_0008.png",
            "/xl_1/ComfyUI_0009.png",
            "/xl_1/ComfyUI_0010.png",
            // Add the URLs for your 10 images here
        ];

        // Function to create story elements dynamically
        function createStoryElements() {
            const storyContainer = document.getElementById('story-container');

            for (let i = 0; i < storyPrompts.length; i++) {
                const paragraph = document.createElement('p');
                paragraph.textContent = storyPrompts[i];
                storyContainer.appendChild(paragraph);

                if (i < storyImages.length) {
                    const image = document.createElement('img');
                    image.src = storyImages[i];
                    storyContainer.appendChild(image);
                }
            }
        }

        // Call the function to generate the story elements
        createStoryElements();
    </script>

</body>
</html>
