<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=index1.html">
    <title>Random Story Redirect</title>
</head>
<body>
    <p>If you are not redirected, <a href="index1.html">click here</a>.</p>

    <script>
        // Function to generate a random number between 1 and 10
        function getRandomNumber() {
            return Math.floor(Math.random() * 10) + 1;
        }

        // Automatically redirect to a random sub-website (stories1, stories2, etc.)
        const randomSubWebsite = `stories${getRandomNumber()}.html`;
        window.location.href = randomSubWebsite;
    </script>
</body>
</html>
