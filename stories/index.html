<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=/stories/stories%20(1th%c20opy)/index.html">
    <title>Random Story Redirect</title>
</head>
<body>
    <p>If you are not redirected, <a href="/stories/stories%20(1th%20copy)/index.html">click here</a>.</p>

    <script>
        // Function to generate a random number between 1 and 10
        function getRandomNumber() {
            return Math.floor(Math.random() * 10) + 1;
        }

        // Automatically redirect to a random sub-website (stories1, stories2, etc.)
        const randomSubWebsite = `/stories/stories%20(${getRandomNumber()}th%20copy)/index.html`;
        window.location.href = randomSubWebsite;
    </script>
</body>
</html>
