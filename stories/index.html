<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkin's Stories</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
        }
        #story-container {
            border: 5px solid red;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            background-color: black;
            color: white; /* Add this line to set the text color */
        }
        img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <h1>Merkin's Magical Adventures</h1>

    <div id="story-container">
        <!-- Story content will be dynamically added here -->
    </div>

    <script>
        // Array of text prompts
        const storyPrompts = [
            "Once upon a time, in a land of wonders, lived Merkin, the magical god.",
            "Merkin had a special power to make dreams come true with a simple wave of their hand.",
            "One day, Merkin decided to explore a hidden enchanted forest filled with mystical creatures.",
            "In the heart of the forest, Merkin discovered a sparkling waterfall that granted wishes to those who believed.",
            "As Merkin approached the waterfall, a friendly dragon named Sparkle appeared, eager to be friends.",
            "Together, Merkin and Sparkle embarked on a journey to help their forest friends solve a magical mystery.",
            "They encountered mischievous fairies, talking trees, and even a mislaid spellbook that caused hilarious chaos.",
            "Merkin's kind heart and magical abilities brought joy and harmony to the enchanted forest.",
            "In gratitude, the creatures of the forest organized a grand celebration in honor of Merkin's extraordinary deeds.",
            "And so, with laughter and happiness echoing through the forest, Merkin and their newfound friends lived happily ever after."
        ];

        // Array of image URLs
        const storyImages = [
            "image1.jpg",
            "image2.jpg",
            // Add the URLs for your 10 images here
        ];

        // Function to create story elements dynamically
        function createStoryElements() {
            const storyContainer = document.getElementById('story-container');

            for (let i = 0; i < storyPrompts.length; i++) {
                const paragraph = document.createElement('p');
                paragraph.textContent = storyPrompts[i];
                storyContainer.appendChild(paragraph);

                if (i < storyImages.length) {
                    const image = document.createElement('img');
                    image.src = storyImages[i];
                    storyContainer.appendChild(image);
                }
            }
        }

        // Call the function to generate the story elements
        createStoryElements();
    </script>

</body>
</html>
