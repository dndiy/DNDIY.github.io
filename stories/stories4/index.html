<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkin's Stories</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
        }
        #story-container {
            border: 5px solid red;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            background-color: black;
            color: white; /* Add this line to set the text color */
        }
        img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <h1>The Tedious Adventures of Bob and Jane:</h1>

    <div id="story-container">
        <!-- Story content will be dynamically added here -->
    </div>

    <script>
        // Array of text prompts
        const storyPrompts = [
"In a riveting town where excitement never happened, there was a guy named Bob, whose idea of an adventure was finding matching socks.",

"Bob's neighbor, Jane, had a pet rock named Rocky, claiming it had a fantastic sense of humor. Spoiler: it didn't.",

"One day, Bob stumbled upon a map that promised 'The World's Most Boring Treasure.'",

"Jane insisted they embark on the quest. Yawn.",

"Their thrilling journey led them to a library where the 'treasure' turned out to be a riveting collection of instruction manuals.",

"Bob and Jane encountered a wizard named Gary, who claimed to have mastered the art of turning excitement into sheer monotony.",

"Gary's spellcasting skills included transforming lively parties into mildly awkward social gatherings.",

"In the midst of their 'adventure,' Bob and Jane met a talking sloth who, surprisingly, spoke at a snail's pace.",

"The sloth's wise advice: 'Why rush when you can leisurely amble through the mundanity of life?' Inspiring, right?",

"As they returned home, Bob and Jane decided to host an 'Unexcitement Gala,' complete with a 'Most Boring Outfit' competition.",

"The gala became an annual event, drawing attendees from neighboring towns seeking the ultimate cure for insomnia.",
        ];

        // Array of image URLs
        const storyImages = [
            "/stories/stories4/xl_1/ComfyUI_0001.png",
            "/stories/stories4/xl_1/ComfyUI_0002.png",
            "/stories/stories4/xl_1/ComfyUI_0003.png",
            "/stories/stories4/xl_1/ComfyUI_0004.png",
            "/stories/stories4/xl_1/ComfyUI_0005.png",
            "/stories/stories4/xl_1/ComfyUI_0006.png",
            "/stories/stories4/xl_1/ComfyUI_0007.png",
            "/stories/stories4/xl_1/ComfyUI_0008.png",
            "/stories/stories4/xl_1/ComfyUI_0009.png",
            "/stories/stories4/xl_1/ComfyUI_0010.png",
            "/stories/stories4/xl_1/ComfyUI_0011.png",
            // Add the URLs for your 10 images here
        ];

        // Function to create story elements dynamically
        function createStoryElements() {
            const storyContainer = document.getElementById('story-container');

            for (let i = 0; i < storyPrompts.length; i++) {
                const paragraph = document.createElement('p');
                paragraph.textContent = storyPrompts[i];
                storyContainer.appendChild(paragraph);

                if (i < storyImages.length) {
                    const image = document.createElement('img');
                    image.src = storyImages[i];
                    storyContainer.appendChild(image);
                }
            }
        }

        // Call the function to generate the story elements
        createStoryElements();
    </script>

</body>
</html>
