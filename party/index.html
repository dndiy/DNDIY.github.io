<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April: The Party in a Can</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffcccb;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #ff33cc;
        }
        img {
            border-radius: 50%;
            width: 200px;
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            background-color: #ff66b2;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>April: The Party in a Can</h1>
<img src="IMG_20220423_153640740_HDR.jpg" alt="April's Photo" id="aprilPhoto">
<p>April shines, like glitter in the sky.<br>
She dances wild, never letting life pass her by.<br>
Every room she enters, becomes the stage,<br>
With her, every moment, is the age of rave.</p>
<button onclick="changePhoto()">Surprise Me!</button>

<script>
    function changePhoto() {
        const images = [
            "IMG_20220427_214730141.jpg",
            "PXL_20230716_222833747.jpg",
            "PXL_20230520_215604665.MP.jpg"
        ];
        const randomIndex = Math.floor(Math.random() * images.length);
        document.getElementById('aprilPhoto').src = images[randomIndex];
    }
</script>

</body>
</html>
